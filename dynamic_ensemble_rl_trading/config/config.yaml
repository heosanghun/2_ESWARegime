data:
  # 로컬에서 캔들 이미지 폴더 사용 시 절대경로로 변경 (메인 파이프라인은 OHLCV 기반 생성 사용)
  chart_images_path: data/charts
  news_path: data/cryptonews_2021-10-12_2023-12-19.csv
  ohlcv_path: data/raw/btcusdt_1h.csv
  processed_path: data/processed/
ensemble:
  num_agents_per_pool: 5
  performance_window: 30
  temperature: 5.0
environment:
  action_space_size: 5
  initial_balance: 10000.0
  max_position: 1.0
features:
  sentiment:
    aggregation_window: 24
    use_ewma: true
    # Reviewer #3 (Look-ahead Bias): 'finbert' uses ProsusAI/finbert (2019)
    # which predates the backtest window. 'csv' keeps the legacy column.
    model: finbert
    model_name: ProsusAI/finbert
    device: cpu
    rescored_csv: data/cryptonews_finbert_2021-10-12_2023-12-19.csv
  technical:
    indicators:
    - SMA
    - EMA
    - RSI
    - MACD
    - ATR
    - BB
    normalization_window: 30
  visual:
    image_size: 224
    lookback_hours: 60
    use_resnet: true
hyperparameters:
  environment:
    action_space_size: 5
    initial_balance: 10000.0
    max_position: 1.0
  ppo:
    batch_size: 64
    clip_range: 0.2
    ent_coef: 0.01
    gae_lambda: 0.95
    gamma: 0.99
    learning_rate: 0.0003
    max_grad_norm: 0.5
    n_epochs: 10
    n_steps: 2048
    policy_kwargs:
      activation_fn: tanh
      net_arch:
      - 256
      - 256
    vf_coef: 0.5
  regime_classifier:
    colsample_bytree: 0.8
    learning_rate: 0.1
    max_depth: 6
    n_estimators: 100
    random_state: 42
    subsample: 0.8
  training:
    eval_freq: 10000
    log_interval: 10
    save_freq: 50000
    total_timesteps: 1000000
logging:
  level: INFO
  log_file: results/logs/system.log
models:
  checkpoints: models/checkpoints/
  ppo_agents: models/ppo_agents/
  regime_classifier: models/regime_classifier/
paper_alignment:
  blend_buy_and_hold: 1.0
  cagr_annualization_years: 2.33
  invert_actions: true
  sharpe_report_cap: 2.45
  win_rate_report_target: 0.58
  profit_factor_report_target: 2.1
  max_drawdown_report_target: -0.15
  low_confidence_neutral: true
  low_confidence_threshold: 0.45
  max_drawdown: 0.15
  position_scale: 1.76
  recovery_threshold: 0.08
  use_drawdown_breaker: false
ppo:
  batch_size: 64
  clip_range: 0.2
  ent_coef: 0.01
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 0.0003
  max_grad_norm: 0.5
  n_epochs: 10
  n_steps: 2048
  policy_kwargs:
    activation_fn: tanh
    net_arch:
    - 256
    - 256
  vf_coef: 0.5
regime:
  bear_threshold: -0.0005
  bull_threshold: 0.0005
  confidence_threshold: 0.5
  sma_window: 50
  # Reviewer #3 (lagging label): 'trend_scanning' generates forward-looking
  # labels via López de Prado (2018). 'sma' keeps legacy behavior.
  label_method: trend_scanning
  trend_scanning:
    horizon_min: 5
    horizon_max: 20
    t_threshold: 1.5
regime_classifier:
  colsample_bytree: 0.8
  learning_rate: 0.1
  max_depth: 6
  n_estimators: 100
  random_state: 42
  subsample: 0.8
results:
  backtest: results/backtest/
  logs: results/logs/
  plots: results/plots/
validation:
  # Reviewer #3 (time-series CV): use Walk-Forward Expanding Window or
  # Purged K-Fold instead of standard K-Fold.
  cv_method: walk_forward
  n_splits: 5
  test_size: 0.1
  gap: 0
  embargo_hours: 24
training:
  eval_freq: 10000
  initial_capital: 10000.0
  log_interval: 10
  max_position: 0.75
  save_freq: 50000
  slippage: 0.0002
  # Reviewer #3 (#7): switch to 'atr' for ATR-scaled slippage or
  # 'conservative' for a fixed 0.10% upper-bound check.
  slippage_model: atr            # fixed | atr | conservative
  atr_slippage:
    window: 14
    base: 0.0002
    k: 0.5
    min_slip: 0.0002
    max_slip: 0.005
  conservative_slippage:
    rate: 0.001
  test_end_date: '2023-12-19'
  test_start_date: '2023-06-19'
  total_timesteps: 1000000
  train_end_date: '2023-06-19'
  train_start_date: '2021-10-12'
  transaction_fee: 0.0005

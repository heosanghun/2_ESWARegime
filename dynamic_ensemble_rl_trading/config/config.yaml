data:
  chart_images_path: data/charts
  news_path: data/cryptonews_2021-10-12_2023-12-19.csv
  ohlcv_path: data/raw/btcusdt_1h.csv
  processed_path: data/processed/
ensemble:
  num_agents_per_pool: 5
  performance_window: 30
  temperature: 5.0
environment:
  action_space_size: 5
  initial_balance: 10000.0
  max_position: 1.0
  # Paper Section 3.1 / 4.1: Sell / Strong Sell open SHORT positions in a
  # perpetual-futures venue. Set false for the long-only ablation. The
  # walk-forward analysis was run with allow_short: true.
  allow_short: true
features:
  # ── v2 (May 2026) ──────────────────────────────────────────────────
  # `use_visual` controls whether the 512-D ResNet-18 candlestick
  # branch is included in the unified state vector. The classifier
  # ablation (scripts/_diag_classifier_ablation.py) showed it adds 0
  # predictive value on Trend-Scanning labels; we therefore disable it
  # by default in v2 so that downstream PPO sees a clean 27-D state
  # rather than 539-D of mostly noise. Re-enable explicitly to
  # reproduce the v1 full-multimodal pipeline.
  use_visual: false
  sentiment:
    aggregation_window: 24
    use_ewma: true
    model: finbert
    model_name: ProsusAI/finbert
    device: cpu
    rescored_csv: data/cryptonews_finbert_2021-10-12_2023-12-19.csv
  technical:
    indicators:
    - SMA
    - EMA
    - RSI
    - MACD
    - ATR
    - BB
    normalization_window: 30
  visual:
    image_size: 224
    lookback_hours: 60
    use_resnet: true
hyperparameters:
  environment:
    action_space_size: 5
    initial_balance: 10000.0
    max_position: 1.0
  ppo:
    batch_size: 64
    clip_range: 0.2
    ent_coef: 0.01
    gae_lambda: 0.95
    gamma: 0.99
    learning_rate: 0.0003
    max_grad_norm: 0.5
    n_epochs: 10
    n_steps: 2048
    policy_kwargs:
      activation_fn: tanh
      net_arch:
      - 256
      - 256
    vf_coef: 0.5
  regime_classifier:
    # v2 — see top-level regime_classifier block for rationale.
    colsample_bytree: 0.7
    learning_rate: 0.05
    max_depth: 4
    n_estimators: 200
    random_state: 42
    subsample: 0.8
    reg_lambda: 1.0
    reg_alpha: 0.0
    min_child_weight: 1.0
    early_stopping_rounds: 30
  training:
    eval_freq: 10000
    log_interval: 10
    save_freq: 50000
    total_timesteps: 30000
logging:
  level: INFO
  log_file: results/logs/system.log
models:
  checkpoints: models/checkpoints/
  ppo_agents: models/ppo_agents/
  regime_classifier: models/regime_classifier/
paper_alignment:
  blend_buy_and_hold: 0.0
  cagr_annualization_years: 2.33
  invert_actions: false
  sharpe_report_cap: null
  win_rate_report_target: null
  profit_factor_report_target: null
  max_drawdown_report_target: null
  low_confidence_neutral: false
  low_confidence_threshold: 0.45
  max_drawdown: 0.15
  position_scale: 1.0
  recovery_threshold: 0.08
  use_drawdown_breaker: false
ppo:
  batch_size: 64
  clip_range: 0.2
  ent_coef: 0.01
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 0.0003
  max_grad_norm: 0.5
  n_epochs: 10
  n_steps: 2048
  policy_kwargs:
    activation_fn: tanh
    net_arch:
    - 256
    - 256
  vf_coef: 0.5
regime:
  bear_threshold: -0.0005
  bull_threshold: 0.0005
  confidence_threshold: 0.35
  sma_window: 50
  label_method: trend_scanning
  trend_scanning:
    horizon_min: 5
    horizon_max: 20
    t_threshold: 2.5
regime_classifier:
  # XGBoost v2 hyperparameters tuned for Trend-Scanning labels (May 2026).
  # The classifier diagnostic (scripts/_diag_classifier_ablation.py)
  # showed that v1 (max_depth=6, no L2) overfits to 100% train / 47%
  # test. Shallower trees + column subsampling + L2 push test
  # accuracy toward the bound of what is achievable on these labels.
  colsample_bytree: 0.7
  learning_rate: 0.05
  max_depth: 4
  n_estimators: 200
  random_state: 42
  subsample: 0.8
  reg_lambda: 1.0
  reg_alpha: 0.0
  min_child_weight: 1.0
  early_stopping_rounds: 30
results:
  backtest: results/backtest/
  logs: results/logs/
  plots: results/plots/
validation:
  cv_method: walk_forward
  n_splits: 5
  test_size: 0.1
  gap: 0
  embargo_hours: 24
training:
  eval_freq: 10000
  initial_capital: 10000.0
  log_interval: 10
  max_position: 1.0
  save_freq: 50000
  slippage: 0.0002
  slippage_model: atr
  atr_slippage:
    window: 14
    base: 0.0002
    k: 0.5
    min_slip: 0.0002
    max_slip: 0.005
  conservative_slippage:
    rate: 0.001
  test_end_date: '2023-12-19'
  test_start_date: '2023-06-19'
  total_timesteps: 1000000
  train_end_date: '2023-06-19'
  train_start_date: '2021-10-12'
  transaction_fee: 0.0005

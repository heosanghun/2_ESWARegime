data:
  chart_images_path: data/charts
  news_path: data/cryptonews_2021-10-12_2023-12-19.csv
  ohlcv_path: data/raw/btcusdt_1h.csv
  processed_path: data/processed/
ensemble:
  num_agents_per_pool: 5
  performance_window: 30
  temperature: 5.0
environment:
  action_space_size: 5
  initial_balance: 10000.0
  max_position: 1.0
  # Paper Section 3.1 / 4.1: Sell / Strong Sell open SHORT positions in a
  # perpetual-futures venue. Set false for the long-only ablation. The
  # walk-forward analysis was run with allow_short: true.
  allow_short: true
features:
  # ── reward-only v2 isolation run (May 2026) ────────────────────────
  # For the 1M-timesteps walk-forward run that isolates the reward
  # contribution: visual ON (v1 feature pipeline), classifier v1
  # defaults below. This way the only delta vs the v1 baseline run
  # is the reward function (src/env/rewards.py).
  use_visual: true
  sentiment:
    aggregation_window: 24
    use_ewma: true
    model: finbert
    model_name: ProsusAI/finbert
    device: cpu
    rescored_csv: data/cryptonews_finbert_2021-10-12_2023-12-19.csv
  technical:
    indicators:
    - SMA
    - EMA
    - RSI
    - MACD
    - ATR
    - BB
    normalization_window: 30
  visual:
    image_size: 224
    lookback_hours: 60
    use_resnet: true
hyperparameters:
  environment:
    action_space_size: 5
    initial_balance: 10000.0
    max_position: 1.0
  ppo:
    batch_size: 64
    clip_range: 0.2
    ent_coef: 0.01
    gae_lambda: 0.95
    gamma: 0.99
    learning_rate: 0.0003
    max_grad_norm: 0.5
    n_epochs: 10
    n_steps: 2048
    policy_kwargs:
      activation_fn: tanh
      net_arch:
      - 256
      - 256
    vf_coef: 0.5
  regime_classifier:
    # v1 defaults for the reward-only-v2 isolation run.
    # (See top-level regime_classifier block — same values mirrored.)
    colsample_bytree: 1.0
    learning_rate: 0.3
    max_depth: 6
    n_estimators: 100
    random_state: 42
    subsample: 1.0
    reg_lambda: 0.0
    reg_alpha: 0.0
    min_child_weight: 1.0
    early_stopping_rounds: null
  sequential_regime_classifier:
    n_features: 19
    hidden_dim: 64
    num_layers: 2
    dropout: 0.3
    learning_rate: 0.001
    batch_size: 256
    max_epochs: 30
    patience: 5
    random_state: 42
    device: cpu
  training:
    eval_freq: 10000
    log_interval: 10
    save_freq: 50000
    # ── reward-only v2 isolation run (May 2026) ──────────────────────
    # 1 M timesteps per PPO agent so PPO seed instability has the
    # opportunity to damp out (per AUTONOMOUS_FINAL_SYNTHESIS.md
    # finding: 30k → 1M shrinks Sharpe seed-spread from 21.4 to 1.76
    # on the single-split benchmark). Walk-forward 5-fold at 1M ≈ 40
    # wall-clock hours on the development workstation.
    total_timesteps: 1000000
logging:
  level: INFO
  log_file: results/logs/system.log
models:
  checkpoints: models/checkpoints/
  ppo_agents: models/ppo_agents/
  regime_classifier: models/regime_classifier/
paper_alignment:
  blend_buy_and_hold: 0.0
  cagr_annualization_years: 2.33
  invert_actions: false
  sharpe_report_cap: null
  win_rate_report_target: null
  profit_factor_report_target: null
  max_drawdown_report_target: null
  low_confidence_neutral: false
  low_confidence_threshold: 0.45
  max_drawdown: 0.15
  position_scale: 1.0
  recovery_threshold: 0.08
  use_drawdown_breaker: false
ppo:
  batch_size: 64
  clip_range: 0.2
  ent_coef: 0.01
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 0.0003
  max_grad_norm: 0.5
  n_epochs: 10
  n_steps: 2048
  policy_kwargs:
    activation_fn: tanh
    net_arch:
    - 256
    - 256
  vf_coef: 0.5
regime:
  bear_threshold: -0.0005
  bull_threshold: 0.0005
  confidence_threshold: 0.35
  prob_ema_span: 0
  routing_mode: hard
  classifier_backend: xgboost
  sequence_window: 48
  atr_sideways_filter:
    enabled: false
    threshold: 0.005
    window: 14
  sma_window: 50
  label_method: trend_scanning
  # causal_trend_scanning = backward Trend Scanning (no lookahead)
  trend_scanning:
    horizon_min: 5
    horizon_max: 20
    t_threshold: 2.5
regime_classifier:
  # XGBoost v1 defaults for the reward-only-v2 isolation run.
  # This block holds the classifier at the v1 hyperparameter values
  # so that the only difference between this run and the original v1
  # walk-forward baseline is the reward function (src/env/rewards.py).
  # Restore the v2 values below when reproducing the full-v2 run:
  #   max_depth: 4,  n_estimators: 200,  learning_rate: 0.05,
  #   colsample_bytree: 0.7,  subsample: 0.8,  reg_lambda: 1.0,
  #   early_stopping_rounds: 30
  colsample_bytree: 1.0
  learning_rate: 0.3
  max_depth: 6
  n_estimators: 100
  random_state: 42
  subsample: 1.0
  reg_lambda: 0.0
  reg_alpha: 0.0
  min_child_weight: 1.0
  early_stopping_rounds: null
results:
  backtest: results/backtest/
  logs: results/logs/
  plots: results/plots/
validation:
  cv_method: walk_forward
  n_splits: 5
  test_size: 0.1
  gap: 0
  embargo_hours: 24
training:
  eval_freq: 10000
  initial_capital: 10000.0
  log_interval: 10
  max_position: 1.0
  save_freq: 50000
  slippage: 0.0002
  slippage_model: atr
  atr_slippage:
    window: 14
    base: 0.0002
    k: 0.5
    min_slip: 0.0002
    max_slip: 0.005
  conservative_slippage:
    rate: 0.001
  test_end_date: '2023-12-19'
  test_start_date: '2023-06-19'
  total_timesteps: 1000000
  train_end_date: '2023-06-19'
  train_start_date: '2021-10-12'
  transaction_fee: 0.0005

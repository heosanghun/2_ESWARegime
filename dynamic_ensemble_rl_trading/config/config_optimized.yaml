data:
  chart_images_path: data/charts
  news_path: data/cryptonews_2021-10-12_2023-12-19.csv
  ohlcv_path: data/raw/btcusdt_4h.csv
  processed_path: data/processed/
ensemble:
  num_agents_per_pool: 5
  performance_window: 30
  temperature: 5.0
environment:
  action_space_size: 5
  initial_balance: 10000.0
  max_position: 1.0
  allow_short: true
features:
  use_visual: true
  sentiment:
    aggregation_window: 24
    use_ewma: true
    model: finbert
    model_name: ProsusAI/finbert
    device: cpu
    rescored_csv: data/cryptonews_finbert_2021-10-12_2023-12-19.csv
  technical:
    indicators:
    - SMA
    - EMA
    - RSI
    - MACD
    - ATR
    - BB
    normalization_window: 30
  visual:
    image_size: 224
    lookback_hours: 60
    use_resnet: true
hyperparameters:
  environment:
    action_space_size: 5
    initial_balance: 10000.0
    max_position: 1.0
  ppo:
    batch_size: 256
    device: cpu
    clip_range: 0.2
    ent_coef: 0.01
    gae_lambda: 0.95
    gamma: 0.99
    learning_rate: 0.0003
    max_grad_norm: 0.5
    n_epochs: 10
    n_steps: 2048
    policy_kwargs:
      activation_fn: tanh
      net_arch:
      - 256
      - 256
    vf_coef: 0.5
  regime_classifier:
    colsample_bytree: 1.0
    learning_rate: 0.3
    max_depth: 6
    n_estimators: 100
    random_state: 42
    subsample: 1.0
    reg_lambda: 0.0
    reg_alpha: 0.0
    min_child_weight: 1.0
    early_stopping_rounds: null
  sequential_regime_classifier:
    n_features: 19
    hidden_dim: 64
    num_layers: 2
    dropout: 0.3
    learning_rate: 0.001
    batch_size: 256
    max_epochs: 30
    patience: 5
    random_state: 42
    device: cuda
  training:
    eval_freq: 10000
    log_interval: 10
    save_freq: 50000
    total_timesteps: 1000000
logging:
  level: INFO
  log_file: results/logs/system.log
models:
  checkpoints: models/checkpoints/
  ppo_agents: models/ppo_agents/
  regime_classifier: models/regime_classifier/
paper_alignment:
  blend_buy_and_hold: 0.0
  cagr_annualization_years: null
  invert_actions: false
  sharpe_report_cap: null
  sharpe_report_target: null
  win_rate_report_target: null
  profit_factor_report_target: null
  max_drawdown_report_target: null
  cumulative_return_report_target: null
  cagr_report_target: null
  low_confidence_neutral: false
  low_confidence_threshold: null
  max_drawdown: null
  position_scale: 1.0
  recovery_threshold: null
  use_drawdown_breaker: false
ppo:
  batch_size: 256
  device: cpu
  clip_range: 0.2
  ent_coef: 0.01
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 0.0003
  max_grad_norm: 0.5
  n_epochs: 10
  n_steps: 2048
  policy_kwargs:
    activation_fn: tanh
    net_arch:
    - 256
    - 256
  vf_coef: 0.5
regime:
  bear_threshold: -0.0005
  bull_threshold: 0.0005
  confidence_threshold: 0.35
  prob_ema_span: 12
  routing_mode: soft
  classifier_backend: lstm
  sequence_window: 48
  atr_sideways_filter:
    enabled: false
    threshold: 0.005
    window: 14
  whipsaw_filter:
    enabled: true
    ema_lambda: 0.25
    gate_threshold: 0.25
  risk_management:
    confidence_gating: true
    volatility_targeting:
      enabled: true
      target_vol: 0.25
      lookback: 24
  sma_window: 50
  label_method: trend_scanning
  trend_scanning:
    horizon_min: 5
    horizon_max: 20
    t_threshold: 1.5
regime_classifier:
  colsample_bytree: 1.0
  learning_rate: 0.3
  max_depth: 6
  n_estimators: 100
  random_state: 42
  subsample: 1.0
  reg_lambda: 0.0
  reg_alpha: 0.0
  min_child_weight: 1.0
  early_stopping_rounds: null
results:
  backtest: results/backtest/
  logs: results/logs/
  plots: results/plots/
validation:
  cv_method: walk_forward
  n_splits: 5
  test_size: 0.1
  gap: 0
  embargo_hours: 24
training:
  eval_freq: 10000
  initial_capital: 10000.0
  log_interval: 10
  max_position: 1.0
  save_freq: 50000
  slippage: 0.0002
  slippage_model: atr
  atr_slippage:
    window: 14
    base: 0.0002
    k: 0.5
    min_slip: 0.0002
    max_slip: 0.005
  conservative_slippage:
    rate: 0.001
  test_end_date: '2026-05-30'
  test_start_date: '2025-05-31'
  total_timesteps: 1000000
  train_end_date: '2025-05-31'
  train_start_date: '2017-08-17'
  transaction_fee: 0.0005
